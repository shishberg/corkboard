<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>corkboard — live preview</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; }
    body { display: flex; align-items: center; justify-content: center; }
    img { max-width: 100vw; max-height: 100vh; image-rendering: pixelated; box-shadow: 0 0 0 1px #333; }
  </style>
</head>
<body>
  <img id="frame" alt="live preview">
  <script>
    // The server stamps in the timestamp of the currently rendered frame.
    let shown = Number("__UPDATED_AT__") || 0;
    const frame = document.getElementById('frame');
    frame.src = '/preview.png?v=' + shown;

    // Long-poll: ask the server to hold the request open until it has a render
    // newer than what we're showing, then swap the image and ask again. The
    // server always answers 200 with the latest timestamp, so a timeout just
    // re-polls and a missed update self-corrects on the next round.
    async function poll() {
      for (;;) {
        try {
          const res = await fetch('/preview/updates?since=' + shown);
          const { updatedAt } = await res.json();
          if (updatedAt > shown) {
            shown = updatedAt;
            frame.src = '/preview.png?v=' + shown;
          }
        } catch {
          // Server restarting or offline — back off, then keep trying.
          await new Promise((r) => setTimeout(r, 2000));
        }
      }
    }
    poll();
  </script>
</body>
</html>
